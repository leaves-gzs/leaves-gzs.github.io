name: 更新OI数据

on:
  workflow_dispatch:    # 这行表示：只在网页上手动点按钮时运行

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # 允许自动提交代码

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: |
          cd crawler
          pip install -r requirements.txt

      - name: 运行爬虫
        env:
          LUOGU_CLIENT_ID: ${{ secrets.LUOGU_CLIENT_ID }}
          LUOGU_UID: ${{ secrets.LUOGU_UID }}
        run: |
          cd crawler
          python crawler.py

      - name: 提交更新到仓库
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 一键更新洛谷数据"
          file_pattern: "oi-dashboard/assets/app-data.js"
