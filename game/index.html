<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'PingFang SC', Roboto, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 48px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }
        .back-link {
            display: inline-block;
            margin-top: 4px;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.95rem;
            border-bottom: 1px dashed rgba(255,255,255,0.15);
            transition: 0.2s;
        }
        .back-link:hover {
            color: #fff;
            border-bottom-color: #fff;
        }
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            border-radius: 4px;
            margin: 16px auto 28px;
        }
        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-top: 10px;
        }
        .game-card {
            display: block;
            padding: 20px 28px;
            border-radius: 60px;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            text-align: center;
            letter-spacing: 0.5px;
        }
        .game-card.tower {
            background: linear-gradient(135deg, #4a9eff, #2a6eff);
            box-shadow: 0 8px 24px rgba(42, 110, 255, 0.3);
        }
        .game-card.tower:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(42, 110, 255, 0.5);
            background: linear-gradient(135deg, #5aafff, #3a7eff);
        }
        .game-card.mc {
            background: linear-gradient(135deg, #7cb342, #33691e);
            box-shadow: 0 8px 24px rgba(51, 105, 30, 0.3);
        }
        .game-card.mc:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(51, 105, 30, 0.5);
            background: linear-gradient(135deg, #8bc34a, #558b2f);
        }
        .game-card.gay {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            box-shadow: 0 8px 24px rgba(232, 67, 147, 0.3);
        }
        .game-card.gay:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(232, 67, 147, 0.5);
            background: linear-gradient(135deg, #ff8ab0, #f062a0);
        }
        /* ===== 猫国建设 卡片风格（新增） ===== */
        .game-card.maoamo {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            box-shadow: 0 8px 24px rgba(247, 151, 30, 0.35);
            color: #1a1a2e;
        }
        .game-card.maoamo:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 36px rgba(247, 151, 30, 0.55);
            background: linear-gradient(135deg, #fdaa2a, #ffe44a);
        }
        .game-card.maoamo .desc {
            color: rgba(26, 26, 46, 0.7);
        }
        .game-card:active {
            transform: scale(0.97);
        }
        .game-card .desc {
            display: block;
            font-size: 0.85rem;
            font-weight: 400;
            opacity: 0.8;
            margin-top: 4px;
            letter-spacing: 0.3px;
        }
        .footer-note {
            margin-top: 32px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.25);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
        }
        @media (max-width: 480px) {
            .container { padding: 32px 20px; }
            h1 { font-size: 2.2rem; }
            .game-card { font-size: 1.1rem; padding: 16px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 游戏中心</h1>
        <a href="index.html" class="back-link">← 返回主页</a>
        <div class="divider"></div>

        <div class="game-grid">
            <!-- 塔防游戏 -->
            <a href="game.html" class="game-card tower">
                ⚔️ 塔防游戏
                <span class="desc">策略防守，消灭敌人</span>
            </a>

            <!-- 我的世界·轻量版 -->
            <a href="mclight.html" class="game-card mc">
                ⛏️ 我的世界·轻量版
                <span class="desc">砍树 · 挖矿 · 合成 · 战斗</span>
            </a>

            <!-- ===== 猫国建设 · 终极版（新增） ===== -->
            <a href="maomao/index.html" class="game-card maomao">
                🏗️ 猫国建设 · 终极版
                <span class="desc">放置挂机 · 20级合成 · 科技树 · 矿区探索</span>
            </a>

            <!-- 以后可以继续添加 -->
            <!-- 
            <a href="game2.html" class="game-card gay">
                🎯 新游戏
                <span class="desc">描述</span>
            </a>
            -->
        </div>

        <div class="footer-note">
            💡 更多有趣的内容正在路上……
        </div>
    </div>
</body>
</html>
