<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>局域网聊天室</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* ===== 背景装饰 ===== */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(74, 144, 217, 0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(120, 80, 200, 0.06) 0%, transparent 50%);
            animation: bgFloat 30s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(2%, 1%) rotate(2deg);
            }
        }

        /* ===== 主容器 ===== */
        .chat-app {
            position: relative;
            z-index: 1;
            width: 96vw;
            max-width: 1200px;
            height: 92vh;
            max-height: 800px;
            background: rgba(20, 20, 35, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.04);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* ===== 顶部标题栏 ===== */
        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.03);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            flex-shrink: 0;
            min-height: 68px;
        }

        .chat-header .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.3px;
            color: #fff;
        }

        .chat-header .brand .icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #4A90D9, #7B5EA7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .chat-header .status {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .chat-header .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            display: inline-block;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        .chat-header .status .online-count {
            color: #fff;
            font-weight: 500;
        }

        /* ===== 主体 (用户列表 + 聊天区) ===== */
        .chat-body {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ---- 左侧用户列表 ---- */
        .user-sidebar {
            width: 220px;
            background: rgba(0, 0, 0, 0.25);
            border-right: 1px solid rgba(255, 255, 255, 0.04);
            padding: 16px 0;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .user-sidebar .sidebar-title {
            padding: 0 18px 12px 18px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            justify-content: space-between;
        }

        .user-sidebar .sidebar-title span {
            color: rgba(255, 255, 255, 0.25);
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 8px 8px 8px;
        }

        .user-list::-webkit-scrollbar {
            width: 4px;
        }
        .user-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .user-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            margin-bottom: 2px;
            transition: background 0.2s;
            cursor: default;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .user-item .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4A90D9, #7B5EA7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            flex-shrink: 0;
        }

        .user-item .username {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.85);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .user-item .username.me {
            color: #4A90D9;
            font-weight: 500;
        }

        .user-item .user-status {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #4ade80;
            margin-left: auto;
            flex-shrink: 0;
        }

        /* ---- 右侧聊天区域 ---- */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(0, 0, 0, 0.15);
            min-width: 0;
        }

        /* 消息列表 */
        .message-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px 12px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message-area::-webkit-scrollbar {
            width: 5px;
        }
        .message-area::-webkit-scrollbar-track {
            background: transparent;
        }
        .message-area::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 6px;
        }

        /* 消息气泡 */
        .msg {
            display: flex;
            flex-direction: column;
            animation: msgIn 0.25s ease-out;
        }

        @keyframes msgIn {
            0% {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg .msg-meta {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 2px;
        }

        .msg .msg-meta .sender {
            font-size: 14px;
            font-weight: 600;
            color: #b0b0d0;
        }

        .msg .msg-meta .sender.me {
            color: #4A90D9;
        }

        .msg .msg-meta .time {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            font-weight: 400;
        }

        .msg .msg-bubble {
            display: inline-block;
            max-width: 72%;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 14px 14px 14px 4px;
            font-size: 15px;
            line-height: 1.6;
            color: #e8e8f0;
            word-break: break-word;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .msg .msg-bubble.system {
            background: rgba(74, 144, 217, 0.10);
            border-color: rgba(74, 144, 217, 0.15);
            color: rgba(255, 255, 255, 0.55);
            font-size: 13px;
            padding: 5px 16px;
            border-radius: 20px;
            max-width: 90%;
        }

        .msg .msg-bubble.system .highlight {
            color: #7B9ED9;
            font-weight: 500;
        }

        .msg.own .msg-meta .sender {
            color: #4A90D9;
        }

        .msg.own .msg-bubble {
            background: rgba(74, 144, 217, 0.18);
            border-color: rgba(74, 144, 217, 0.15);
            border-radius: 14px 14px 4px 14px;
            align-self: flex-end;
        }

        .msg.own {
            align-items: flex-end;
        }

        .msg.own .msg-meta {
            flex-direction: row-reverse;
        }

        .msg.own .msg-meta .time {
            margin-right: 4px;
        }

        /* ---- 输入区域 ---- */
        .input-area {
            padding: 12px 24px 20px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            gap: 12px;
            flex-shrink: 0;
            background: rgba(0, 0, 0, 0.15);
        }

        .input-area input {
            flex: 1;
            padding: 10px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #e0e0e0;
            font-size: 15px;
            outline: none;
            transition: border 0.25s, background 0.25s;
            min-width: 0;
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .input-area input:focus {
            border-color: rgba(74, 144, 217, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }

        .input-area input:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .input-area .btn-send {
            padding: 10px 28px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4A90D9, #6B5B8F);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
            flex-shrink: 0;
            letter-spacing: 0.3px;
        }

        .input-area .btn-send:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(74, 144, 217, 0.25);
        }

        .input-area .btn-send:active {
            transform: scale(0.96);
        }

        .input-area .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* ===== 登录覆盖层 ===== */
        .login-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            background: rgba(10, 10, 22, 0.92);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 28px;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .login-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 40px 44px;
            width: 380px;
            max-width: 90vw;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .login-card .logo {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .login-card h2 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .login-card p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 14px;
            margin-bottom: 28px;
        }

        .login-card .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login-card .input-group input {
            padding: 12px 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #e0e0e0;
            font-size: 16px;
            outline: none;
            transition: border 0.25s;
            text-align: center;
        }

        .login-card .input-group input:focus {
            border-color: rgba(74, 144, 217, 0.4);
        }

        .login-card .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .login-card .btn-join {
            margin-top: 8px;
            padding: 12px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #4A90D9, #7B5EA7);
            color: #fff;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.25s;
        }

        .login-card .btn-join:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 24px rgba(74, 144, 217, 0.3);
        }

        .login-card .btn-join:active {
            transform: scale(0.96);
        }

        .login-card .hint {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
        }

        /* ===== 断连提示 ===== */
        .disconnect-banner {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 60, 60, 0.85);
            backdrop-filter: blur(12px);
            padding: 10px 24px;
            border-radius: 16px;
            font-size: 14px;
            color: #fff;
            display: none;
            z-index: 5;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }

        .disconnect-banner.show {
            display: block;
            animation: fadeUp 0.4s ease-out;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateX(-50%) translateY(12px);
            }
            100% {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* ===== 响应式 ===== */
        @media (max-width: 700px) {
            .chat-app {
                height: 100vh;
                max-height: none;
                border-radius: 0;
                width: 100vw;
            }

            .login-overlay {
                border-radius: 0;
            }

            .user-sidebar {
                width: 140px;
                padding: 10px 0;
            }

            .user-sidebar .sidebar-title {
                padding: 0 12px 8px 12px;
                font-size: 10px;
            }

            .user-item {
                padding: 6px 10px;
            }
            .user-item .username {
                font-size: 12px;
            }
            .user-item .avatar {
                width: 26px;
                height: 26px;
                font-size: 11px;
            }

            .message-area {
                padding: 12px 14px 8px 14px;
            }

            .msg .msg-bubble {
                font-size: 14px;
                padding: 6px 12px;
                max-width: 85%;
            }

            .input-area {
                padding: 10px 14px 14px 14px;
                gap: 8px;
            }
            .input-area input {
                font-size: 14px;
                padding: 8px 14px;
            }
            .input-area .btn-send {
                padding: 8px 18px;
                font-size: 14px;
            }

            .login-card {
                padding: 30px 24px;
            }
            .login-card h2 {
                font-size: 20px;
            }

            .chat-header {
                padding: 12px 16px;
                min-height: 56px;
            }
            .chat-header .brand {
                font-size: 17px;
            }
            .chat-header .brand .icon {
                width: 30px;
                height: 30px;
                font-size: 15px;
            }
            .chat-header .status {
                font-size: 12px;
            }
        }

        @media (max-width: 480px) {
            .user-sidebar {
                width: 0;
                padding: 0;
                border: none;
                overflow: hidden;
            }
            .chat-body .user-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主应用 ===== -->
    <div class="chat-app" id="app">

        <!-- 登录覆盖层 -->
        <div class="login-overlay" id="loginOverlay">
            <div class="login-card">
                <div class="logo">💬</div>
                <h2>加入聊天室</h2>
                <p>输入一个昵称，开始局域网交流</p>
                <div class="input-group">
                    <input type="text" id="usernameInput" placeholder="输入昵称..." maxlength="16" autofocus />
                    <button class="btn-join" id="joinBtn">进入聊天</button>
                </div>
                <div class="hint">💡 确保 WebSocket 服务器已运行</div>
            </div>
        </div>

        <!-- 断连横幅 -->
        <div class="disconnect-banner" id="disconnectBanner">⚠️ 与服务器断开连接，请检查网络</div>

        <!-- ===== 头部 ===== -->
        <header class="chat-header">
            <div class="brand">
                <span class="icon">💬</span>
                <span>局域网聊天室</span>
            </div>
            <div class="status">
                <span class="dot"></span>
                <span>在线 <span class="online-count" id="onlineCount">0</span> 人</span>
            </div>
        </header>

        <!-- ===== 主体 ===== -->
        <div class="chat-body">
            <!-- 用户列表 -->
            <aside class="user-sidebar">
                <div class="sidebar-title">
                    在线用户
                    <span id="userCountBadge">0</span>
                </div>
                <div class="user-list" id="userList">
                    <!-- 动态渲染 -->
                </div>
            </aside>

            <!-- 聊天区 -->
            <main class="chat-main">
                <div class="message-area" id="messageArea">
                    <!-- 动态消息 -->
                    <div class="msg">
                        <div class="msg-bubble system">👋 欢迎来到聊天室，连接服务器后即可开始交流</div>
                    </div>
                </div>

                <!-- 输入区 -->
                <div class="input-area">
                    <input type="text" id="msgInput" placeholder="输入消息..." maxlength="500" disabled />
                    <button class="btn-send" id="sendBtn" disabled>发送</button>
                </div>
            </main>
        </div>
    </div>

    <script>
        // ================================================================
        //  局域网聊天室 — 前端逻辑 (WebSocket)
        // ================================================================

        (function() {
            'use strict';

            // ----- DOM 引用 -----
            const loginOverlay = document.getElementById('loginOverlay');
            const usernameInput = document.getElementById('usernameInput');
            const joinBtn = document.getElementById('joinBtn');

            const messageArea = document.getElementById('messageArea');
            const msgInput = document.getElementById('msgInput');
            const sendBtn = document.getElementById('sendBtn');
            const userList = document.getElementById('userList');
            const onlineCount = document.getElementById('onlineCount');
            const userCountBadge = document.getElementById('userCountBadge');
            const disconnectBanner = document.getElementById('disconnectBanner');

            // ----- 状态 -----
            let ws = null;
            let myName = '';
            let isConnected = false;
            const reconnectDelay = 2000; // 重连间隔 (ms)
            let reconnectTimer = null;
            let userListCache = []; // 缓存用户列表

            // ----- 服务器地址 (默认使用当前页面的 host, 端口 3000) -----
            function getWebSocketURL() {
                // 直接填你电脑的局域网 IP（例如 192.168.11.207）
                return "ws://10.110.146.86:3000";
            }

            // ----- 工具: 格式化时间 -----
            function formatTime() {
                const d = new Date();
                const pad = n => String(n).padStart(2, '0');
                return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
            }

            // ----- 渲染消息 -----
            function appendMessage(sender, text, isOwn = false, isSystem = false) {
                const div = document.createElement('div');
                div.className = 'msg' + (isOwn ? ' own' : '');

                const meta = document.createElement('div');
                meta.className = 'msg-meta';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'sender' + (isOwn ? ' me' : '');
                nameSpan.textContent = isSystem ? '系统' : sender;

                const timeSpan = document.createElement('span');
                timeSpan.className = 'time';
                timeSpan.textContent = formatTime();

                meta.appendChild(nameSpan);
                meta.appendChild(timeSpan);
                div.appendChild(meta);

                const bubble = document.createElement('div');
                bubble.className = 'msg-bubble' + (isSystem ? ' system' : '');
                if (isSystem) {
                    bubble.innerHTML = text; // 支持 <span class="highlight">
                } else {
                    bubble.textContent = text;
                }
                div.appendChild(bubble);

                messageArea.appendChild(div);
                messageArea.scrollTop = messageArea.scrollHeight;
            }

            // ----- 渲染用户列表 -----
            function renderUserList(users) {
                userListCache = users || [];
                userList.innerHTML = '';
                const myNameLower = myName.toLowerCase();

                // 按名字排序
                const sorted = [...userListCache].sort((a, b) => a.localeCompare(b));

                for (const name of sorted) {
                    const isMe = name.toLowerCase() === myNameLower;
                    const item = document.createElement('div');
                    item.className = 'user-item';

                    const avatar = document.createElement('div');
                    avatar.className = 'avatar';
                    avatar.textContent = name.charAt(0).toUpperCase();

                    const uname = document.createElement('span');
                    uname.className = 'username' + (isMe ? ' me' : '');
                    uname.textContent = name + (isMe ? ' (我)' : '');

                    const dot = document.createElement('span');
                    dot.className = 'user-status';

                    item.appendChild(avatar);
                    item.appendChild(uname);
                    item.appendChild(dot);
                    userList.appendChild(item);
                }

                const count = userListCache.length;
                onlineCount.textContent = count;
                userCountBadge.textContent = count;
            }

            // ----- 系统消息: 加入/离开 -----
            function appendSystemMessage(text, highlight = '') {
                let html = text;
                if (highlight) {
                    html = text.replace(highlight, `<span class="highlight">${highlight}</span>`);
                }
                appendMessage('系统', html, false, true);
            }

            // ----- WebSocket 连接 -----
            function connectWebSocket() {
                if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
                    return;
                }

                const url = getWebSocketURL();
                try {
                    ws = new WebSocket(url);
                } catch (e) {
                    console.warn('WebSocket 创建失败:', e);
                    scheduleReconnect();
                    return;
                }

                ws.onopen = function() {
                    console.log('✅ WebSocket 已连接');
                    isConnected = true;
                    disconnectBanner.classList.remove('show');
                    msgInput.disabled = false;
                    sendBtn.disabled = false;

                    // 发送登录消息
                    if (myName) {
                        sendLogin(myName);
                    }

                    // 清除重连定时器
                    if (reconnectTimer) {
                        clearTimeout(reconnectTimer);
                        reconnectTimer = null;
                    }
                };

                ws.onmessage = function(event) {
                    try {
                        const data = JSON.parse(event.data);
                        handleMessage(data);
                    } catch (e) {
                        console.warn('解析消息失败:', e);
                    }
                };

                ws.onclose = function() {
                    console.warn('⚠️ WebSocket 已断开');
                    isConnected = false;
                    msgInput.disabled = true;
                    sendBtn.disabled = true;
                    disconnectBanner.classList.add('show');
                    scheduleReconnect();
                };

                ws.onerror = function(err) {
                    console.warn('WebSocket 错误:', err);
                    // 错误后 onclose 会接着触发
                };
            }

            // ----- 发送登录 -----
            function sendLogin(name) {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                ws.send(JSON.stringify({
                    type: 'login',
                    name: name
                }));
            }

            // ----- 发送消息 -----
            function sendMessage(text) {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;
                if (!text.trim()) return;
                ws.send(JSON.stringify({
                    type: 'message',
                    text: text.trim()
                }));
                // 本地立即显示 (乐观更新)
                appendMessage(myName, text.trim(), true);
                msgInput.value = '';
                msgInput.focus();
            }

            // ----- 处理服务器消息 -----
            function handleMessage(data) {
                switch (data.type) {
                    case 'login_success':
                        myName = data.name;
                        appendSystemMessage(`✨ 欢迎回来，<span class="highlight">${data.name}</span>`);
                        // 更新用户列表
                        if (data.users) {
                            renderUserList(data.users);
                        }
                        break;

                    case 'user_joined':
                        appendSystemMessage(`👋 <span class="highlight">${data.name}</span> 加入了聊天室`);
                        if (data.users) {
                            renderUserList(data.users);
                        }
                        break;

                    case 'user_left':
                        appendSystemMessage(`👋 <span class="highlight">${data.name}</span> 离开了聊天室`);
                        if (data.users) {
                            renderUserList(data.users);
                        }
                        break;

                    case 'user_list':
                        if (data.users) {
                            renderUserList(data.users);
                        }
                        break;

                    case 'message':
                        // 别人发的消息
                        if (data.name && data.text) {
                            const isOwn = data.name.toLowerCase() === myName.toLowerCase();
                            if (!isOwn) {
                                appendMessage(data.name, data.text);
                            }
                            // 如果是自己发的，已经在 sendMessage 里显示了，忽略
                        }
                        break;

                    case 'error':
                        console.warn('服务器错误:', data.text);
                        break;

                    default:
                        console.log('未知消息类型:', data);
                }
            }

            // ----- 重连调度 -----
            function scheduleReconnect() {
                if (reconnectTimer) return;
                reconnectTimer = setTimeout(() => {
                    reconnectTimer = null;
                    if (!isConnected && myName) {
                        console.log('🔄 尝试重新连接...');
                        connectWebSocket();
                    }
                }, reconnectDelay);
            }

            // ----- 登出 & 清理 -----
            function logout() {
                if (ws) {
                    try { ws.close(); } catch (_) {}
                    ws = null;
                }
                isConnected = false;
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
                msgInput.disabled = true;
                sendBtn.disabled = true;
                myName = '';
                renderUserList([]);
                // 不清除消息，保留历史
            }

            // ================================================================
            //  UI 事件绑定
            // ================================================================

            // ----- 登录 -----
            function handleLogin() {
                const name = usernameInput.value.trim();
                if (!name) {
                    usernameInput.focus();
                    usernameInput.style.borderColor = 'rgba(220,60,60,0.5)';
                    setTimeout(() => { usernameInput.style.borderColor = ''; }, 800);
                    return;
                }
                if (name.length > 16) {
                    alert('昵称不能超过 16 个字符');
                    return;
                }
                // 保存名字
                myName = name;
                loginOverlay.classList.add('hidden');
                // 连接 WebSocket
                connectWebSocket();
                // 聚焦输入
                setTimeout(() => msgInput.focus(), 300);
            }

            joinBtn.addEventListener('click', handleLogin);
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            // ----- 发送消息 -----
            function handleSend() {
                const text = msgInput.value;
                if (!text.trim()) return;
                if (!isConnected) {
                    disconnectBanner.classList.add('show');
                    return;
                }
                sendMessage(text);
            }

            sendBtn.addEventListener('click', handleSend);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSend();
                }
            });

            // ----- 点击输入框自动聚焦 -----
            msgInput.addEventListener('focus', () => {
                if (!isConnected) {
                    disconnectBanner.classList.add('show');
                }
            });

            // ----- 页面关闭前主动断开 -----
            window.addEventListener('beforeunload', function() {
                if (ws) {
                    try { ws.close(); } catch (_) {}
                }
            });

            // ----- 如果用户重新打开页面，自动使用上次的名字 (存在 sessionStorage) -----
            (function init() {
                const saved = sessionStorage.getItem('chat_username');
                if (saved) {
                    usernameInput.value = saved;
                }
                // 自动聚焦登录框
                usernameInput.focus();
                // 如果是本地开发，自动填入示例名字
                if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                    if (!usernameInput.value) {
                        usernameInput.value = '用户' + Math.floor(Math.random() * 1000);
                    }
                }
            })();

            // 登录后保存名字到 sessionStorage
            const origLogin = handleLogin;
            handleLogin = function() {
                const name = usernameInput.value.trim();
                if (name) {
                    sessionStorage.setItem('chat_username', name);
                }
                origLogin.call(this);
            };
            joinBtn.removeEventListener('click', handleLogin);
            joinBtn.addEventListener('click', handleLogin);
            usernameInput.removeEventListener('keydown', handleLogin);
            usernameInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') handleLogin();
            });

            // 暴露一些调试信息 (非必须)
            console.log('💬 局域网聊天室已加载');
            console.log(`📡 WebSocket 目标: ${getWebSocketURL()}`);
            console.log('📌 输入昵称后点击 "进入聊天" 即可连接');

        })();
    </script>
</body>
</html>
