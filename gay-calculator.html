<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>🌈 基度指数计算器</title>
    <style>
        /* 完全沿用之前的样式，此处省略（篇幅原因），实际使用时请复制之前生成的完整 style 块 */
        /* 但为了一体化，这里我会把完整的 CSS 和 JS 都放进来 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            background: linear-gradient(145deg, #f9e3e3 0%, #f5d0d0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 182, 193, 0.3) 0%, transparent 50%),
                              radial-gradient(circle at 90% 80%, rgba(135, 206, 250, 0.2) 0%, transparent 50%);
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 40px 40px;
            padding: 32px 24px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10), 0 8px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            text-align: center;
        }
        .title {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #ff6b6b, #feca57, #48dbfb, #a29bfe, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
            display: inline-block;
        }
        .subhead {
            font-size: 15px;
            color: #6c5b7b;
            background: rgba(255, 255, 255, 0.5);
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 4px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        .subhead small {
            font-size: 12px;
            opacity: 0.7;
        }
        .description {
            margin: 20px 0 16px;
            font-size: 14px;
            color: #4a3f5a;
            line-height: 1.6;
            background: rgba(255, 240, 245, 0.5);
            padding: 12px 16px;
            border-radius: 24px;
            border: 1px dashed #f8c8c8;
            letter-spacing: 0.3px;
        }
        .description em {
            font-style: normal;
            color: #e84393;
            font-weight: 600;
        }
        .input-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 16px 0 24px;
            justify-content: center;
        }
        .input-group input {
            flex: 1;
            min-width: 160px;
            padding: 16px 20px;
            border: 2px solid #f0d0d0;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 500;
            color: #2d1b3d;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(4px);
            outline: none;
            transition: all 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        .input-group input:focus {
            border-color: #fd79a8;
            box-shadow: 0 0 0 4px rgba(253, 121, 168, 0.15);
            background: white;
        }
        .input-group input::placeholder {
            color: #b5a6c0;
            font-weight: 400;
            font-size: 16px;
        }
        .input-group button {
            padding: 16px 32px;
            background: linear-gradient(135deg, #fd79a8, #e84393);
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(232, 67, 147, 0.3);
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .input-group button:active {
            transform: scale(0.94);
            box-shadow: 0 4px 12px rgba(232, 67, 147, 0.4);
        }
        .input-group button span {
            font-size: 22px;
        }
        .result-area {
            margin-top: 24px;
            transition: all 0.4s ease;
        }
        .result-area.hidden {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            height: 0;
            overflow: hidden;
            margin-top: 0;
        }
        .result-area.visible {
            opacity: 1;
            transform: translateY(0);
            height: auto;
        }
        .percentage-display {
            font-size: 72px;
            font-weight: 800;
            color: #2d1b3d;
            line-height: 1;
            margin-bottom: 4px;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #6c5b7b, #355c7d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .percentage-display .percent-sign {
            font-size: 40px;
            -webkit-text-fill-color: #6c5b7b;
            opacity: 0.6;
        }
        .gauge-bar-wrap {
            width: 100%;
            height: 14px;
            background: rgba(200, 180, 200, 0.25);
            border-radius: 20px;
            overflow: hidden;
            margin: 12px 0 16px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.04);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .gauge-bar {
            height: 100%;
            width: 0%;
            border-radius: 20px;
            background: linear-gradient(90deg, #fdcb6e, #e17055, #d63031, #e84393, #6c5ce7, #0984e3, #00b894);
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 12px rgba(232, 67, 147, 0.3);
        }
        .comment {
            font-size: 20px;
            font-weight: 600;
            color: #2d1b3d;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(4px);
            border-radius: 40px;
            margin: 8px 0 10px;
            border: 1px solid rgba(255,255,255,0.6);
            display: inline-block;
            min-width: 120px;
        }
        .comment .emoji {
            font-size: 28px;
            margin-right: 8px;
        }
        .extra-meta {
            font-size: 13px;
            color: #7a6a8a;
            margin-top: 10px;
            line-height: 1.5;
            border-top: 1px solid rgba(200, 180, 200, 0.2);
            padding-top: 14px;
            display: flex;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .extra-meta span {
            background: rgba(255,255,255,0.3);
            padding: 4px 14px;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }
        .disclaimer {
            margin-top: 24px;
            font-size: 12px;
            color: #a08aa0;
            background: rgba(255,255,255,0.2);
            padding: 6px 16px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        @media (max-width: 480px) {
            .card { padding: 24px 16px 32px; border-radius: 36px; }
            .title { font-size: 24px; }
            .input-group input { min-width: 120px; padding: 14px 18px; font-size: 16px; }
            .input-group button { padding: 14px 24px; font-size: 17px; }
            .percentage-display { font-size: 56px; }
            .percentage-display .percent-sign { font-size: 32px; }
            .comment { font-size: 17px; padding: 10px 14px; }
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-4px); }
            100% { transform: translateY(0px); }
        }
        .title {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">🌈 基度指数</div>
        <div class="subhead">✨ 性取向 · 科学探测仪 <small>v2.0</small></div>
        <div class="description">
            🔬 基于 <em>“名字声纹共振”</em> 与 <em>“彩虹光谱分析”</em><br>
            输入你的名字，测出你的 Gay 属性百分比！
        </div>
        <div class="input-group">
            <input type="text" id="nameInput" placeholder="输入你的名字..." maxlength="20" autocomplete="off">
            <button id="calcBtn"><span>✨</span> 探测</button>
        </div>
        <div id="resultArea" class="result-area hidden">
            <div class="percentage-display">
                <span id="percentNumber">0</span><span class="percent-sign">%</span>
            </div>
            <div class="gauge-bar-wrap">
                <div id="gaugeBar" class="gauge-bar" style="width: 0%;"></div>
            </div>
            <div id="commentBox" class="comment">
                <span class="emoji">🧐</span> 等待探测...
            </div>
            <div class="extra-meta">
                <span id="hashInfo">🔑 哈希值: --</span>
                <span id="lengthInfo">📏 字长: --</span>
            </div>
        </div>
        <div class="disclaimer">⚠️ 纯属娱乐 · 切勿当真 · 开心就好</div>
    </div>

    <script>
        (function() {
            'use strict';
            const nameInput = document.getElementById('nameInput');
            const calcBtn = document.getElementById('calcBtn');
            const resultArea = document.getElementById('resultArea');
            const percentNumber = document.getElementById('percentNumber');
            const gaugeBar = document.getElementById('gaugeBar');
            const commentBox = document.getElementById('commentBox');
            const hashInfo = document.getElementById('hashInfo');
            const lengthInfo = document.getElementById('lengthInfo');

            const comments = [
                { min: 0, max: 15, emoji: '🪨', text: '钢铁直男，毫无悬念' },
                { min: 16, max: 30, emoji: '🍃', text: '略微清新，有待观察' },
                { min: 31, max: 45, emoji: '🌊', text: '双鱼摇摆，潜质初现' },
                { min: 46, max: 60, emoji: '🌈', text: '彩虹微光，左右逢源' },
                { min: 61, max: 75, emoji: '🔥', text: '彩虹旗飘，潜力股！' },
                { min: 76, max: 90, emoji: '💖', text: '确认过眼神，是圈内人' },
                { min: 91, max: 100, emoji: '👑', text: 'Gay 圈天菜，舍你其谁！' },
            ];

            function calculateGayness(name) {
                if (!name || name.trim().length === 0) return 0;
                const trimmed = name.trim();
                let hash = 0;
                for (let i = 0; i < trimmed.length; i++) {
                    const code = trimmed.charCodeAt(i);
                    hash = ((hash << 5) - hash) + code;
                    hash = hash & hash;
                }
                const lengthFactor = trimmed.length * 7 + 13;
                hash = (hash * 31 + lengthFactor) & 0x7fffffff;
                let percent = Math.abs(hash) % 101;
                const vowels = trimmed.match(/[aeiouAEIOU]/g);
                const vowelCount = vowels ? vowels.length : 0;
                percent = (percent + vowelCount * 3) % 101;
                if (percent === 0) percent = 1;
                return percent;
            }

            function getComment(percent) {
                for (let entry of comments) {
                    if (percent >= entry.min && percent <= entry.max) {
                        return entry;
                    }
                }
                return { emoji: '🤔', text: '无法定义，你是独特的' };
            }

            function updateResult(name) {
                const trimmed = name.trim();
                if (!trimmed) {
                    resultArea.classList.remove('visible');
                    resultArea.classList.add('hidden');
                    return;
                }
                const percent = calculateGayness(trimmed);
                const comment = getComment(percent);
                percentNumber.textContent = percent;
                gaugeBar.style.width = percent + '%';
                commentBox.innerHTML = `<span class="emoji">${comment.emoji}</span> ${comment.text}`;
                hashInfo.textContent = `🔑 哈希值: ${percent}`;
                lengthInfo.textContent = `📏 字长: ${trimmed.length}`;
                resultArea.classList.remove('hidden');
                resultArea.classList.add('visible');
                if (percent >= 80) {
                    document.querySelector('.card').style.boxShadow = '0 20px 60px rgba(232, 67, 147, 0.25)';
                } else {
                    document.querySelector('.card').style.boxShadow = '0 20px 60px rgba(0, 0, 0, 0.10)';
                }
            }

            calcBtn.addEventListener('click', function() {
                updateResult(nameInput.value);
            });
            nameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    updateResult(nameInput.value);
                }
            });
            nameInput.addEventListener('input', function() {
                if (this.value.trim() === '') {
                    resultArea.classList.remove('visible');
                    resultArea.classList.add('hidden');
                }
            });
            nameInput.focus();
        })();
    </script>
</body>
</html>
